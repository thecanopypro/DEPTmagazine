<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Canopy - Stories beneath the leaves</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="page-flip.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #111; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; font-family: sans-serif;
            overflow: hidden; touch-action: none; 
        }

        #book-wrapper {
            width: 100vw;
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* FORCE THE CONTAINER TO BE NARROW NO MATTER WHAT */
        #book-container {
            width: 100% !important;
            height: 100% !important;
            max-width: 420px !important; /* Extremely strict width to block double-page */
            max-height: 700px !important;
            visibility: hidden;
            margin: 0 auto;
        }

        .page {
            background-color: white;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: white;
        }

        .controls {
            height: 10vh;
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 100;
        }
        
        button {
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        #loading { color: #4CAF50; position: absolute; top: 20px; }
    </style>
</head>
<body>

    <div id="loading">Forcing Kindle View...</div>

    <div id="book-wrapper">
        <div id="book-container"></div>
    </div>
    
    <audio id="flip-sound" src="flip.mp3" preload="auto"></audio>

    <div class="controls">
        <button id="prevBtn">PREV</button>
        <button id="nextBtn">NEXT</button>
    </div>

    <script>
        const pdfUrl = 'your_file.pdf'; 
        const container = document.getElementById('book-container');
        const flipAudio = document.getElementById('flip-sound');
        let pageFlip;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function initFlipbook() {
            try {
                const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 }); 
                    const pageDiv = document.createElement('div');
                    pageDiv.className = "page";
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    
                    const img = new Image();
                    img.src = canvas.toDataURL('image/jpeg', 0.8); 
                    pageDiv.appendChild(img);
                    container.appendChild(pageDiv);
                    canvas.width = 0; canvas.height = 0;
                }

                document.getElementById('loading').style.display = 'none';
                container.style.visibility = 'visible';

                // THE STRONGEST CONFIGURATION POSSIBLE
                pageFlip = new St.PageFlip(container, {
                    width: 400, 
                    height: 600,
                    size: "stretch",
                    mode: "portrait",       
                    displayMode: "portrait", 
                    clickEventForward: false,
                    usePortrait: true,      // Tells library to IGNORE horizontal space
                    showCover: false,       
                    drawShadow: true,
                    flippingTime: 800,
                    minWidth: 200,
                    maxWidth: 450,
                    minHeight: 300,
                    maxHeight: 700
                });

                pageFlip.loadFromHTML(document.querySelectorAll(".page"));
                
                // FORCE THE STATE MANUALLY AFTER 100ms TO OVERRIDE AUTO-DETECTION
                setTimeout(() => {
                    pageFlip.updateState('portrait');
                    pageFlip.updateFromHtml(document.querySelectorAll(".page"));
                }, 100);

                document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
                document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();
                pageFlip.on('flip', () => {
                    flipAudio.currentTime = 0;
                    flipAudio.play().catch(()=>{});
                });

            } catch (error) {
                console.error(error);
            }
        }

        window.onload = initFlipbook;
    </script>
</body>
</html>
